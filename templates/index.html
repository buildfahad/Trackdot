{%extends "layout.html" %}
{% block title %}Home{% endblock %}
{% block content %}
    <div class="ct-div">
        <form action="/player" class="form-horizontal d-flex flex-column align-items-center w-100" method="get">
            <div>
                {% with messages = get_flashed_messages() %}
                    {% if messages %}
                        <div class="alert alert-info" role="alert">
                            {{ messages[0] }}
                        </div>
                    {% endif %}
                {% endwith %}
            </div>
            <h2 class="mb-2" style="color: #6366f1; min-height: 40px;"><strong id="logo"></strong></h2>
            <div class="form-group mb-3">
                <input autofocus type="text" class="form-control w-auto" style="background-color: #1a1a1a; color: #6366f1; font-family: 'Nunito', sans-serif; border: 1px solid #6366f1;" name="idtag" placeholder="Enter your ID tag" required>
            </div>
            <div class="d-flex justify-content-center">
                <button type="submit" class="btn btn-outline-primary" style="color: #6366f1; border-color: #6366f1;">Fetch</button>
            </div>
        </form>
    </div>
{% endblock %}
