{%extends "layout.html" %}
{% block title %}Login{% endblock %}
{% block content %}
    <div class="form-div">
        <form action="/login" class="form-horizontal d-flex flex-column align-items-center w-100" method="post">
            <div>
                {% with messages = get_flashed_messages() %}
                    {% if messages %}
                        <div class="alert alert-danger" role="alert">
                            {{ messages[0] }}
                        </div>
                    {% endif %}
                {% endwith %}
            </div>
            <div class="d-flex flex-column align-items-center">
                <h2 class="mx-auto mb-2" style="color: #6366f1;"><strong id="logo"></strong></h2>
            </div>
            <div class="form-group mb-3">
                <input autofocus type="text" class="form-control mx-auto w-auto" style="background-color: #1a1a1a; color: #6366f1; font-family: 'Nunito', sans-serif; border: 1px solid #6366f1;" id="username" name="username" placeholder="Username" required>
            </div>
            <div class="form-group mb-3">
                <input type="password" class="form-control mx-auto w-auto" style="background-color: #1a1a1a; color: #6366f1; font-family: 'Nunito', sans-serif; border: 1px solid #6366f1;" id="password" name="password" placeholder="Password" required>
            </div>
            <div class="d-flex justify-content-center">
                <button type="submit" class="btn btn-outline-primary" style="color: #6366f1; border-color: #6366f1;">Login</button>
            </div>
            <p class="mt-3" style="color: #e0e0e0;">Don't have an account? <a href="/register" style="color: #6366f1;">Register here</a>.</p>
        </form>
    </div>
{% endblock %}
